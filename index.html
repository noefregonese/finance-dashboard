<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to le Bloomberg du pauvre</title>
  <style>
    /* === Reset basique === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* === Style global === */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      padding: 2rem;
    }

    /* === Container principal === */
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* === Header === */
    header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #262626;
    }

    h1 {
      color : red;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #737373;
      font-size: 0.95rem;
    }

    /* === Zone de contenu (vide pour l'instant) === */
    .content {
      padding: 3rem 1rem;
      text-align: center;
      color: #525252;
      border: 1px dashed #262626;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>Finance Dashboard</h1>
      <p class="subtitle">Millions en construction</p>
    </header>

    <main class="content">
      <p>Zone de contenu — à remplir étape par étape.</p>
    </main>

  </div>
</body>
</html>
